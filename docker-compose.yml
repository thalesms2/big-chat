services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bigchat
      POSTGRES_PASSWORD: bigchat
      POSTGRES_DB: bigchat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bigchat"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bigchat:bigchat@db:5432/bigchat
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
